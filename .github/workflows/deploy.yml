name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/kb-rag-backend:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/kb-rag-backend:latest \
            ./backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/kb-rag-backend:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/kb-rag-backend:latest

      - name: Build and push frontend image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/kb-rag-frontend:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/kb-rag-frontend:latest \
            ./frontend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/kb-rag-frontend:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/kb-rag-frontend:latest

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: prod

    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy backend
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }}-backend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/kb-rag-backend:${{ github.sha }}

      - name: Deploy frontend
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }}-frontend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/kb-rag-frontend:${{ github.sha }}
